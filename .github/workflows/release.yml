name: Release

# Cut a release by pushing a version tag:
#   npm version patch        # bumps package.json + tags v2.0.1 (also bump tauri.conf.json + Cargo.toml)
#   git push --follow-tags
# This builds the macOS app, signs the update artifact, publishes a GitHub Release, and writes
# the `latest.json` manifest that every installed copy polls on launch.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & publish (macOS arm64)
    runs-on: macos-latest
    permissions:
      contents: write # create the GitHub Release + upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      # The signing identity is self-signed ("Agent Forge Signing"), so codesign refuses it with
      # CSSMERR_TP_NOT_TRUSTED unless the runner explicitly trusts the certificate first. The
      # public cert lives in-repo (public material; the private key is only in the
      # APPLE_CERTIFICATE secret and ~/.tauri on the dev machine).
      - name: Trust the self-signed signing certificate
        run: |
          # Modern macOS refuses non-interactive trust changes unless the trust-settings
          # authorization right is opened first — without this, add-trusted-cert exits 0 but
          # silently does nothing and codesign later fails with "failed to resolve signing identity".
          sudo security authorizationdb write com.apple.trust-settings.admin allow
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain src-tauri/certs/agentforge-codesign.crt
          # Fail HERE with a clear message (not deep inside the bundler) if trust didn't take.
          security verify-cert -c src-tauri/certs/agentforge-codesign.crt -p codeSign

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri update-signing key (minisign). Generated locally with `tauri signer generate`;
          # the PRIVATE key + its password live only in repo secrets, never in git.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Code signing with a SELF-SIGNED identity ("Agent Forge Signing", generated locally,
          # backed up in ~/.tauri/agentforge-codesign.*). NOT notarization — Gatekeeper still needs
          # the one-time right-click → Open. The point is a STABLE code-signing identity: macOS TCC
          # keys permission grants (Accessibility/Automation/Screen Recording/Full Disk Access) to
          # the signing identity, and ad-hoc builds change identity every release, silently voiding
          # every grant on every update. A constant identity makes grants survive updates.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization stays OFF (needs a paid Apple Developer account). To enable later:
          # add APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID secrets and uncomment:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Agent Forge ${{ github.ref_name }}"
          releaseBody: "See the assets below to download. The app auto-updates itself on next launch."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin

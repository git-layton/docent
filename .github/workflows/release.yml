name: Release

# Cut a release by pushing a version tag:
#   npm version patch        # bumps package.json + tags v2.0.1 (also bump tauri.conf.json + Cargo.toml)
#   git push --follow-tags
# This builds the macOS app, signs the update artifact, publishes a GitHub Release, and writes
# the `latest.json` manifest that every installed copy polls on launch.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & publish (macOS arm64)
    runs-on: self-hosted
    permissions:
      contents: write # create the GitHub Release + upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Pre-sign external binaries
        run: |
          echo "Signing llama-libs..."
          codesign --force -s "Developer ID Application: Alexander Layton (57R6U422C4)" --options runtime --timestamp src-tauri/bin/llama-libs/*.dylib 2>/dev/null || codesign --force -s "-" --options runtime --timestamp src-tauri/bin/llama-libs/*.dylib 2>/dev/null || true


      - name: Build & Sign App (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Alexander Layton (57R6U422C4)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target aarch64-apple-darwin

      - name: Publish to Public Releases Repo
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip the 'v' prefix for the updater json
          RAW_VERSION=${VERSION#v}
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Find the built assets (wrap in quotes to handle spaces in app name)
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          TAR_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.tar.gz" | head -n 1)
          SIG_PATH="${TAR_PATH}.sig"
          SIG=$(cat "${SIG_PATH}")

          # Generate latest.json
          # GitHub replaces spaces with dots in release assets, so we must reflect that in the URL
          ASSET_NAME=$(basename "${TAR_PATH}" | tr ' ' '.')
          cat <<EOF > latest.json
          {
            "version": "${RAW_VERSION}",
            "notes": "See the assets to download this version and install.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/git-layton/docent-releases/releases/download/${VERSION}/${ASSET_NAME}"
              }
            }
          }
          EOF

          # Create release and upload all assets using the gh CLI
          gh release create ${VERSION} \
            --repo git-layton/docent-releases \
            --title "Docent ${VERSION}" \
            --notes "See the assets below to download. The app auto-updates itself on next launch." \
            "${DMG_PATH}" \
            "${TAR_PATH}" \
            "${SIG_PATH}" \
            latest.json

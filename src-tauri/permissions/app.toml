# Agent Forge app-command ACL — the SECURITY BOUNDARY for untrusted origins.
#
# Having ANY app permission here flips `RuntimeAuthority::has_app_manifest()` to `true`, so
# tauri-build emits the `__app-acl__` manifest and tauri's IPC layer (tauri-2.10.3
# src/webview/mod.rs ~L1804: `plugin_command.is_some() || has_app_acl_manifest`) enforces the
# capability ACL for app-defined `#[tauri::command]`s too — not just `plugin:`-prefixed ones.
# Without it, every app command was reachable from ANY origin, including remote pages in the
# `browser-panel` child webview.
#
# The two app permissions:
#   * allow-app-local      — the full app surface, granted ONLY to local trusted windows (main,
#                            spotlight). It is AUTO-GENERATED into app_local.gen.toml by build.rs
#                            from `generate_handler!`, so new commands "just work" for the local
#                            UI/agents without editing this file.
#   * allow-browser-remote — the small fire-and-forget reporting surface exposed to remote
#                            (http/https) pages in the browser-panel webview. HAND-CURATED on
#                            purpose: this is the untrusted-origin boundary. Add a command here
#                            ONLY if an injected page-script genuinely must call it AND it cannot
#                            read secrets, inject JS, navigate, or otherwise act with authority.
#
# Everything else (keychain_*, browser_eval, browser_navigate, mail_*, fs/graph/model commands, …)
# is denied to remote callers.

# ── Remote-safe surface — exposed to untrusted pages in the browser-panel webview ──
[[permission]]
identifier = "allow-browser-remote"
description = "Fire-and-forget reporting commands safe to expose to remote (http/https) origins in the browser-panel webview."

[permission.commands]
allow = [
  "browser_agent_report",
  "browser_open_tab",
  "browser_password_event",
  "browser_download_url",
]
